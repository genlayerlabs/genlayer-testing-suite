name: Generate API Docs and PR to genlayer-docs

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  generate-and-sync:
    if: github.event_name != 'release' || !contains(github.event.release.tag_name, '-')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -e .

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "value=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "value=$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')" >> $GITHUB_OUTPUT
          fi

      - name: Generate API docs
        run: python scripts/generate-api-docs.py

      - name: Generate docs repo token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.DOCS_SYNC_APP_ID }}
          private-key: ${{ secrets.DOCS_SYNC_APP_KEY }}
          repositories: genlayer-docs

      - name: Checkout docs repo
        uses: actions/checkout@v4
        with:
          repository: genlayerlabs/genlayer-docs
          token: ${{ steps.app-token.outputs.token }}
          path: docs-repo
          fetch-depth: 0

      - name: Sync and push docs
        working-directory: docs-repo
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          rm -rf pages/api-references/genlayer-test
          mkdir -p pages/api-references/genlayer-test
          cp "${{ github.workspace }}/docs/api-references/index.md" pages/api-references/genlayer-test/index.md
          cp "${{ github.workspace }}/docs/api-references/integration.md" pages/api-references/genlayer-test/integration.md
          cp "${{ github.workspace }}/docs/api-references/direct.md" pages/api-references/genlayer-test/direct.md
          cp "${{ github.workspace }}/docs/api-references/glsim.md" pages/api-references/genlayer-test/glsim.md
          echo '{"integration": "Integration Testing", "direct": "Direct Mode", "glsim": "glsim"}' > pages/api-references/genlayer-test/_meta.json
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit"
            exit 0
          fi
          git add pages/api-references/genlayer-test
          git commit -m "docs(test): sync API reference ${{ steps.version.outputs.value }}"
          git push
